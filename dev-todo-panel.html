<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODO</title>
<style>
  :root {
    --bg: #f6f7f9;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --line: rgba(15, 23, 42, 0.18);
    --accent: #334155;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text-main);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .todo-shell {
    height: 100%;
    overflow-y: auto;
    padding: 14px 14px 22px;
    scrollbar-width: thin;
    scrollbar-color: rgba(15, 23, 42, 0.2) transparent;
  }

  .todo-shell::-webkit-scrollbar {
    width: 5px;
  }

  .todo-shell::-webkit-scrollbar-thumb {
    background: rgba(15, 23, 42, 0.2);
    border-radius: 999px;
  }

  .todo-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(15, 23, 42, 0.08);
  }

  .todo-title {
    font-size: 13px;
    line-height: 1.3;
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text-main);
  }

  .todo-progress {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .todo-progress-track {
    width: 72px;
    height: 4px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.1);
    overflow: hidden;
  }

  .todo-progress-fill {
    width: 0%;
    height: 100%;
    background: var(--accent);
    transition: width 180ms ease;
  }

  .todo-progress-text {
    font-size: 11px;
    line-height: 1;
    color: var(--text-muted);
    min-width: 38px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .todo-group {
    margin-top: 0;
  }

  .todo-group + .todo-group {
    margin-top: 18px;
  }

  .todo-group-title {
    margin: 0 0 8px;
    color: var(--text-main);
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .todo-item {
    margin: 0;
    padding: 5px 0;
  }

  .todo-item:first-of-type {
    padding-top: 0;
  }

  .todo-row {
    display: grid;
    grid-template-columns: 14px 1fr;
    gap: 8px;
    align-items: start;
    cursor: pointer;
  }

  .todo-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--line);
    background: #fff;
    margin: 2px 0 0;
    position: relative;
    cursor: pointer;
  }

  .todo-checkbox:checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .todo-checkbox:checked::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 1px;
    width: 3px;
    height: 6px;
    border: solid #fff;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }

  .todo-copy {
    margin: 0;
    font-size: 12px;
    line-height: 1.5;
    letter-spacing: 0;
    word-break: break-word;
    font-weight: 400;
  }

  .todo-item.done .todo-copy {
    color: var(--text-muted);
    text-decoration: line-through;
  }
</style>
</head>

<script>
  (function () {
    const STORAGE_KEY = "dev-todo-panel-checks-v4";
    const items = Array.from(document.querySelectorAll(".todo-item"));
    const boxes = Array.from(document.querySelectorAll(".todo-checkbox"));
    const fill = document.getElementById("todo-progress-fill");
    const text = document.getElementById("todo-progress-text");

    function loadSaved() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr) || arr.length !== boxes.length) return;
        boxes.forEach((box, i) => {
          if (typeof arr[i] === "boolean") box.checked = arr[i];
        });
      } catch (e) {}
    }

    function persist() {
      try {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify(boxes.map((b) => b.checked))
        );
      } catch (e) {}
    }

    function render() {
      const done = boxes.filter((box) => box.checked).length;
      const total = boxes.length;
      const pct = total ? (done / total) * 100 : 0;
      fill.style.width = pct + "%";
      text.textContent = done + " / " + total;

      items.forEach((item) => {
        const checkbox = item.querySelector(".todo-checkbox");
        item.classList.toggle("done", !!checkbox && checkbox.checked);
      });
    }

    loadSaved();
    render();

    boxes.forEach((box) => {
      box.addEventListener("change", () => {
        persist();
        render();
      });
    });
  })();
</script>
